<!DOCTYPE html>
<html lang="ko">

<head>

<body>

    <article class="profile-card">

        <img src="./img/profile-img.jpg" alt="프로필 이미지">

      <div class="profile-card__cont">

          <strong class="name">hae.woon</strong>

        <p class="profile-card__desc">

        </p>

          <li class="tag">Product</li>

        <button type="button" class="profile-card__cta">친구추가</button>
